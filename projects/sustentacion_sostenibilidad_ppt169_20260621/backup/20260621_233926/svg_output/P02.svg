<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" xmlns:xlink="http://www.w3.org/1999/xlink">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <image x="0" y="0" width="400" height="720" preserveAspectRatio="xMidYMid slice" href="../images/intro_bg.png"/>
  
  <text x="460" y="120" font-family="'Arial Black', SimHei, sans-serif" font-size="43" font-weight="900" fill="#10B981">
    Introducción
  </text>
  
  <rect x="460" y="140" width="60" height="4" fill="#047857"/>
  
  <text x="460" y="220" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="600" fill="#27272A">
    <tspan x="460" dy="0">Las TIC tienen un impacto significativo en el ambiente y</tspan>
    <tspan x="460" dy="45">requieren gestión ética y sostenible.</tspan>
  </text>
  
  <text x="460" y="320" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" fill="#52525B">
    <tspan x="460" dy="0">• Las Tecnologías de la Información y Comunicación (TIC)</tspan>
    <tspan x="480" dy="35">han transformado nuestro mundo.</tspan>
    <tspan x="460" dy="50">• Generan un impacto ambiental que debe ser gestionado.</tspan>
    <tspan x="460" dy="50">• La ética y práctica profesional exigen responsabilidad sostenible.</tspan>
  </text>
  
  <text x="1220" y="680" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="19" fill="#A1A1AA" text-anchor="end">
    2
