<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <text x="60" y="100" font-family="'Arial Black', SimHei, sans-serif" font-size="43" font-weight="900" fill="#10B981">
    TIC y Medio Ambiente
  </text>
  <rect x="60" y="120" width="60" height="4" fill="#047857"/>
  
  <text x="60" y="180" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#27272A">
    El desarrollo y uso de TIC genera consumo y residuos.
  </text>
  
  <rect x="60" y="240" width="360" height="350" rx="8" fill="#F4F4F5" stroke="#E4E4E7" stroke-width="2"/>
  <rect x="60" y="240" width="360" height="8" rx="8" fill="#10B981"/>
  <text x="90" y="300" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#27272A">
    Consumo Energético
  </text>
  <text x="90" y="350" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="20" fill="#52525B">
    <tspan x="90" dy="0">Cantidad de electricidad requerida</tspan>
    <tspan x="90" dy="30">para alimentar y refrigerar centros</tspan>
    <tspan x="90" dy="30">de datos y redes.</tspan>
  </text>
  
  <rect x="460" y="240" width="360" height="350" rx="8" fill="#F4F4F5" stroke="#E4E4E7" stroke-width="2"/>
  <rect x="460" y="240" width="360" height="8" rx="8" fill="#10B981"/>
  <text x="490" y="300" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#27272A">
    Residuos Electrónicos
  </text>
  <text x="490" y="350" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="20" fill="#52525B">
    <tspan x="490" dy="0">Dispositivos que han llegado al</tspan>
    <tspan x="490" dy="30">final de su vida útil y se desechan</tspan>
    <tspan x="490" dy="30">constantemente.</tspan>
  </text>
  
  <rect x="860" y="240" width="360" height="350" rx="8" fill="#F4F4F5" stroke="#E4E4E7" stroke-width="2"/>
  <rect x="860" y="240" width="360" height="8" rx="8" fill="#10B981"/>
  <text x="890" y="300" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#27272A">
    Huella de Carbono
  </text>
  <text x="890" y="350" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="20" fill="#52525B">
    <tspan x="890" dy="0">Impacto derivado del uso</tspan>
    <tspan x="890" dy="30">constante de internet, servicios</tspan>
    <tspan x="890" dy="30">cloud y dispositivos digitales.</tspan>
  </text>
  
  <text x="1220" y="680" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="19" fill="#A1A1AA" text-anchor="end">
    3
  </text>
</svg>
