<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <text x="640" y="100" font-family="'Arial Black', SimHei, sans-serif" font-size="43" font-weight="900" fill="#10B981" text-anchor="middle">
    Aplicación Práctica a EthiCode
  </text>
  <rect x="590" y="120" width="100" height="4" fill="#047857"/>
  
  <text x="640" y="200" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="600" fill="#27272A" text-anchor="middle">
    Nuestro foro aplica sostenibilidad con decisiones de diseño.
  </text>
  
  <rect x="240" y="280" width="800" height="80" rx="8" fill="#F4F4F5"/>
  <text x="280" y="330" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#10B981">1.</text>
  <text x="320" y="330" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" fill="#27272A">
    <tspan font-weight="600">Modo Oscuro nativo:</tspan> Reduce el consumo energético en pantallas OLED.
  </text>

  <rect x="240" y="380" width="800" height="80" rx="8" fill="#F4F4F5"/>
  <text x="280" y="430" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#10B981">2.</text>
  <text x="320" y="430" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" fill="#27272A">
    <tspan font-weight="600">Bases de datos en tiempo real:</tspan> Optimización de consultas en Firestore.
  </text>

  <rect x="240" y="480" width="800" height="80" rx="8" fill="#F4F4F5"/>
  <text x="280" y="530" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#10B981">3.</text>
  <text x="320" y="530" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" fill="#27272A">
    <tspan font-weight="600">Carga eficiente de imágenes:</tspan> Reduce el peso y el tráfico de la red.
  </text>

  <text x="1220" y="680" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="19" fill="#A1A1AA" text-anchor="end">
    5
  </text>
</svg>
