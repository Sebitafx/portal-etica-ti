<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <!-- Marco Top Left -->
  <polygon points="0,0 250,0 0,250" fill="#1E3A8A" />
  <polygon points="0,250 250,0 270,0 0,270" fill="#10B981" />
  <!-- Marco Bottom Right -->
  <polygon points="1280,720 1030,720 1280,470" fill="#1E3A8A" />
  <polygon points="1280,470 1030,720 1010,720 1280,450" fill="#10B981" />

  <text x="120" y="140" font-family="'Arial Black', SimHei, sans-serif" font-size="48" font-weight="900" fill="#1E3A8A">
    Sostenibilidad Visual: Modo Oscuro
  </text>
  <rect x="120" y="170" width="100" height="6" fill="#10B981"/>

  <!-- Bloque ilustrativo del Modo Oscuro -->
  <rect x="120" y="260" width="1040" height="340" rx="16" fill="#0F172A"/>
  
  <circle cx="200" cy="340" r="40" fill="#10B981"/>
  <circle cx="210" cy="330" r="30" fill="#0F172A"/> <!-- Luna -->

  <text x="300" y="340" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="bold" fill="#F8FAFC">
    Interfaz nativa en tonos oscuros (Dark-Tech)
  </text>
  
  <text x="300" y="420" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="26" fill="#CBD5E1">
    <tspan x="300" dy="0">• En pantallas OLED/AMOLED, los píxeles negros literalmente se apagan.</tspan>
    <tspan x="300" dy="50">• Logramos un ahorro directo de batería en los dispositivos móviles de los</tspan>
    <tspan x="320" dy="40">estudiantes y usuarios.</tspan>
    <tspan x="300" dy="50">• Al extender la duración de la batería, prolongamos la vida útil del hardware,</tspan>
    <tspan x="320" dy="40">combatiendo directamente los residuos electrónicos.</tspan>
  </text>
</svg>
