<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <!-- Marco Top Left -->
  <polygon points="0,0 250,0 0,250" fill="#1E3A8A" />
  <polygon points="0,250 250,0 270,0 0,270" fill="#10B981" />
  <!-- Marco Bottom Right -->
  <polygon points="1280,720 1030,720 1280,470" fill="#1E3A8A" />
  <polygon points="1280,470 1030,720 1010,720 1280,450" fill="#10B981" />

  <text x="120" y="140" font-family="'Arial Black', SimHei, sans-serif" font-size="48" font-weight="900" fill="#1E3A8A">
    ¿A qué nos enfrentamos?
  </text>
  <rect x="120" y="170" width="100" height="6" fill="#10B981"/>

  <!-- Card 1 -->
  <rect x="120" y="260" width="320" height="340" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="120" y="260" width="320" height="12" rx="12" fill="#1E3A8A"/>
  <path d="M260 300 l20 40 l-40 0 Z" fill="#10B981"/> <!-- Icono placeholder -->
  <text x="280" y="380" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle">
    Consumo Energético
  </text>
  <text x="280" y="440" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="22" fill="#475569" text-anchor="middle">
    <tspan x="280" dy="0">Refrigeración y</tspan>
    <tspan x="280" dy="30">alimentación continua</tspan>
    <tspan x="280" dy="30">de centros de datos y</tspan>
    <tspan x="280" dy="30">redes globales.</tspan>
  </text>

  <!-- Card 2 -->
  <rect x="480" y="260" width="320" height="340" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="480" y="260" width="320" height="12" rx="12" fill="#10B981"/>
  <circle cx="640" cy="320" r="20" fill="#1E3A8A"/> <!-- Icono placeholder -->
  <text x="640" y="380" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle">
    Residuos Electrónicos
  </text>
  <text x="640" y="440" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="22" fill="#475569" text-anchor="middle">
    <tspan x="640" dy="0">Hardware desechado</tspan>
    <tspan x="640" dy="30">velozmente por</tspan>
    <tspan x="640" dy="30">obsolescencia</tspan>
    <tspan x="640" dy="30">programada.</tspan>
  </text>

  <!-- Card 3 -->
  <rect x="840" y="260" width="320" height="340" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="840" y="260" width="320" height="12" rx="12" fill="#1E3A8A"/>
  <rect x="980" y="300" width="40" height="40" fill="#10B981"/> <!-- Icono placeholder -->
  <text x="1000" y="380" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle">
    Huella de Carbono
  </text>
  <text x="1000" y="440" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="22" fill="#475569" text-anchor="middle">
    <tspan x="1000" dy="0">Gases emitidos por</tspan>
    <tspan x="1000" dy="30">el tráfico constante</tspan>
    <tspan x="1000" dy="30">de datos de millones</tspan>
    <tspan x="1000" dy="30">de usuarios.</tspan>
  </text>
</svg>
