<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <!-- Marco Top Left -->
  <polygon points="0,0 250,0 0,250" fill="#1E3A8A" />
  <polygon points="0,250 250,0 270,0 0,270" fill="#10B981" />
  <!-- Marco Bottom Right -->
  <polygon points="1280,720 1030,720 1280,470" fill="#1E3A8A" />
  <polygon points="1280,470 1030,720 1010,720 1280,450" fill="#10B981" />

  <text x="120" y="160" font-family="'Arial Black', SimHei, sans-serif" font-size="48" font-weight="900" fill="#1E3A8A">
    El Impacto Oculto de la Tecnología
  </text>
  <rect x="120" y="190" width="100" height="6" fill="#10B981"/>

  <!-- Icono decorativo -->
  <g transform="translate(140, 280) scale(5)">
    <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM11 19.93C7.06 19.43 4 16.05 4 12C4 7.95 7.06 4.57 11 4.07V19.93ZM13 4.07C16.94 4.57 20 7.95 20 12C20 16.05 16.94 19.43 13 19.93V4.07Z" fill="#10B981" opacity="0.2"/>
  </g>

  <text x="360" y="320" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" fill="#334155">
    <tspan x="360" dy="0" font-weight="600" fill="#1E3A8A">• La tecnología digital no es "inmaterial".</tspan>
    <tspan x="380" dy="40">Aunque no la veamos, requiere una vasta</tspan>
    <tspan x="380" dy="40">infraestructura física a nivel mundial.</tspan>
    
    <tspan x="360" dy="80" font-weight="600" fill="#1E3A8A">• Consume recursos masivos.</tspan>
    <tspan x="380" dy="40">Redes, servidores y dispositivos móviles</tspan>
    <tspan x="380" dy="40">demandan electricidad constantemente.</tspan>
    
    <tspan x="360" dy="80" font-weight="600" fill="#1E3A8A">• Ética Profesional.</tspan>
    <tspan x="380" dy="40">Como creadores de software, tenemos la obligación</tspan>
    <tspan x="380" dy="40">de mitigar este impacto con decisiones técnicas.</tspan>
  </text>
</svg>
