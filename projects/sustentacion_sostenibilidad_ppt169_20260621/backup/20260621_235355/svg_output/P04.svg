<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <!-- Marco Top Left -->
  <polygon points="0,0 250,0 0,250" fill="#1E3A8A" />
  <polygon points="0,250 250,0 270,0 0,270" fill="#10B981" />
  <!-- Marco Bottom Right -->
  <polygon points="1280,720 1030,720 1280,470" fill="#1E3A8A" />
  <polygon points="1280,470 1030,720 1010,720 1280,450" fill="#10B981" />

  <text x="120" y="140" font-family="'Arial Black', SimHei, sans-serif" font-size="48" font-weight="900" fill="#1E3A8A">
    Green Coding: Nuestra Responsabilidad
  </text>
  <rect x="120" y="170" width="100" height="6" fill="#10B981"/>

  <text x="120" y="240" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#334155">
    Significa escribir código para que consuma la menor energía posible.
  </text>

  <!-- Card 1 -->
  <rect x="120" y="300" width="320" height="280" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="120" y="300" width="320" height="12" rx="12" fill="#10B981"/>
  <text x="280" y="380" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle">
    Algoritmos Eficientes
  </text>
  <text x="280" y="440" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="22" fill="#475569" text-anchor="middle">
    <tspan x="280" dy="0">Diseñar lógica que</tspan>
    <tspan x="280" dy="30">reduzca los ciclos de</tspan>
    <tspan x="280" dy="30">procesamiento (CPU).</tspan>
  </text>

  <!-- Card 2 -->
  <rect x="480" y="300" width="320" height="280" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="480" y="300" width="320" height="12" rx="12" fill="#10B981"/>
  <text x="640" y="380" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle">
    Optimización RAM
  </text>
  <text x="640" y="440" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="22" fill="#475569" text-anchor="middle">
    <tspan x="640" dy="0">Minimizar uso de memoria,</tspan>
    <tspan x="640" dy="30">evitando sobrecargar</tspan>
    <tspan x="640" dy="30">dispositivos móviles.</tspan>
  </text>

  <!-- Card 3 -->
  <rect x="840" y="300" width="320" height="280" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="840" y="300" width="320" height="12" rx="12" fill="#10B981"/>
  <text x="1000" y="380" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#1E3A8A" text-anchor="middle">
    Archivos Ligeros
  </text>
  <text x="1000" y="440" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="22" fill="#475569" text-anchor="middle">
    <tspan x="1000" dy="0">Reducción del peso de</tspan>
    <tspan x="1000" dy="30">recursos web (imágenes,</tspan>
    <tspan x="1000" dy="30">scripts) para ahorrar datos.</tspan>
  </text>
</svg>
