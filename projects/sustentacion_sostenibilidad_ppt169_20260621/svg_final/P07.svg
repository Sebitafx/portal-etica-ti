<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F8FAFC" />
  
  <polygon points="0,0 250,0 0,250" fill="#1E3A8A" />
  <polygon points="0,250 250,0 270,0 0,270" fill="#10B981" />
  
  <polygon points="1280,720 1030,720 1280,470" fill="#1E3A8A" />
  <polygon points="1280,470 1030,720 1010,720 1280,450" fill="#10B981" />

  <text x="120" y="140" font-family="'Arial Black', SimHei, sans-serif" font-size="48" font-weight="900" fill="#1E3A8A">
    Eficiencia en la Base de Datos (Firestore)
  </text>
  <rect x="120" y="170" width="100" height="6" fill="#10B981" />

  <text x="120" y="240" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#334155">
    En el backend también fuimos sostenibles mediante una arquitectura ligera.
  </text>

  
  <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" d="M132,300 H1148 A12,12 0 0 1 1160,312 V388 A12,12 0 0 1 1148,400 H132 A12,12 0 0 1 120,388 V312 A12,12 0 0 1 132,300 Z" />
  <rect x="120" y="300" width="12" height="100" fill="#1E3A8A" rx="0" ry="0" />
  <text x="160" y="360" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" fill="#334155">
    <tspan font-weight="bold" fill="#10B981">Consultas Indexadas:</tspan> Optimizadas para evitar escaneos completos, reduciendo
  </text>
  <text x="160" y="390" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">
    drásticamente la demanda de CPU en los servidores de Google.
  </text>

  
  <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" d="M132,420 H1148 A12,12 0 0 1 1160,432 V508 A12,12 0 0 1 1148,520 H132 A12,12 0 0 1 120,508 V432 A12,12 0 0 1 132,420 Z" />
  <rect x="120" y="420" width="12" height="100" fill="#1E3A8A" rx="0" ry="0" />
  <text x="160" y="480" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" fill="#334155">
    <tspan font-weight="bold" fill="#10B981">Estructura de Datos NoSQL:</tspan> Mantiene los documentos en tamaños mínimos,
  </text>
  <text x="160" y="510" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" fill="#64748B">
    ahorrando ancho de banda y tiempos de carga para el usuario.
  </text>

  
  <path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" d="M132,540 H1148 A12,12 0 0 1 1160,552 V628 A12,12 0 0 1 1148,640 H132 A12,12 0 0 1 120,628 V552 A12,12 0 0 1 132,540 Z" />
  <rect x="120" y="540" width="12" height="100" fill="#1E3A8A" rx="0" ry="0" />
  <text x="160" y="600" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" fill="#334155">
    <tspan font-weight="bold" fill="#10B981">Imágenes en Storage:</tspan> Carga eficiente y almacenamiento comprimido.
  </text>
</svg>