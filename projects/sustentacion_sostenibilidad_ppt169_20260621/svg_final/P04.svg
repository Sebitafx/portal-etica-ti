  </text>
  <text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="640" y="440">Minimizar uso de memoria,</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="640" y="470">evitando sobrecargar</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="640" y="500">dispositivos móviles.</text><path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" d="M852,300 H1148 A12,12 0 0 1 1160,312 V568 A12,12 0 0 1 1148,580 H852 A12,12 0 0 1 840,568 V312 A12,12 0 0 1 852,300 Z" />
