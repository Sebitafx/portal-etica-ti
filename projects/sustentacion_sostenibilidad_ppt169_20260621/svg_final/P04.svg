  <text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="280" y="440">Diseñar lógica que</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="280" y="470">reduzca los ciclos de</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="280" y="500">procesamiento (CPU).</text><path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" d="M492,300 H788 A12,12 0 0 1 800,312 V568 A12,12 0 0 1 788,580 H492 A12,12 0 0 1 480,568 V312 A12,12 0 0 1 492,300 Z" />
