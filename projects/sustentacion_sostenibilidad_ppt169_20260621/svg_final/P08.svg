  <text font-size="32" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#1E3A8A" x="320" y="300" font-weight="bold">Scale-to-Zero (Escalar a Cero)</text><text font-size="26" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#334155" x="320" y="345">Sin servidores físicos inactivos consumiendo energía eléctrica inútilmente.</text><text font-size="32" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#1E3A8A" x="320" y="425" font-weight="bold">Recursos Bajo Demanda</text><text font-size="26" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#334155" x="320" y="470">Solo se ejecuta código y se gasta energía cuando un usuario interactúa.</text><text font-size="32" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#1E3A8A" x="320" y="550" font-weight="bold">Despliegue Ligero con JavaScript</text><text font-size="26" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#334155" x="320" y="595">Lenguaje eficiente para funciones serverless, reduciendo carga y tiempos.</text></svg>