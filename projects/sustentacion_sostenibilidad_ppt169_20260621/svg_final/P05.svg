  <text font-size="28" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#1E3A8A" x="120" y="420" font-weight="bold">1. Plataforma Desarrollada Éticamente:</text><text font-size="28" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#334155" x="160" y="465">Hemos tomado decisiones arquitectónicas enfocadas en</text><text font-size="28" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#334155" x="160" y="510">reducir directamente nuestro impacto ambiental.</text><text font-size="28" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#1E3A8A" x="120" y="590" font-weight="bold">2. Eficiencia centrada en el usuario:</text><text font-size="28" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#334155" x="160" y="635">Optimizaciones diseñadas para que la plataforma fluya rápido,</text><text font-size="28" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#334155" x="160" y="680">consumiendo la menor batería y datos posibles en sus dispositivos.</text></svg>