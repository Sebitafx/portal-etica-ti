  <text x="120" y="140" font-family="'Arial Black', SimHei, sans-serif" font-size="48" font-weight="900" fill="#1E3A8A">
    EthiCode: Nuestro Compromiso
  </text>
  <rect x="120" y="170" width="100" height="6" fill="#10B981" />

  <path fill="#1E3A8A" d="M132,240 H1148 A12,12 0 0 1 1160,252 V328 A12,12 0 0 1 1148,340 H132 A12,12 0 0 1 120,328 V252 A12,12 0 0 1 132,240 Z" />
  <text x="640" y="300" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    No solo hablamos de ética; programamos con ética.
