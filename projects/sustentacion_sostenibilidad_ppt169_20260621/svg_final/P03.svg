  </text>
  <text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="640" y="440">Hardware desechado</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="640" y="470">velozmente por</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="640" y="500">obsolescencia</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="640" y="530">programada.</text><path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" d="M852,260 H1148 A12,12 0 0 1 1160,272 V588 A12,12 0 0 1 1148,600 H852 A12,12 0 0 1 840,588 V272 A12,12 0 0 1 852,260 Z" />
