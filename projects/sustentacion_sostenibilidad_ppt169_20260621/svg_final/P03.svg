  </text>
  <text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="1000" y="440">Gases emitidos por</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="1000" y="470">el tráfico constante</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="1000" y="500">de datos de millones</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="1000" y="530">de usuarios.</text></svg>