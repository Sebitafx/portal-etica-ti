  </text>
  <text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="280" y="440">Refrigeración y</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="280" y="470">alimentación continua</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="280" y="500">de centros de datos y</text><text font-size="22" text-anchor="middle" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#475569" x="280" y="530">redes globales.</text><path fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" d="M492,260 H788 A12,12 0 0 1 800,272 V588 A12,12 0 0 1 788,600 H492 A12,12 0 0 1 480,588 V272 A12,12 0 0 1 492,260 Z" />
  <path fill="#10B981" d="M492,260 H788 A12,6 0 0 1 800,266 V266 A12,6 0 0 1 788,272 H492 A12,6 0 0 1 480,266 V266 A12,6 0 0 1 492,260 Z" />
  <circle cx="640" cy="320" r="20" fill="#1E3A8A" /> 
