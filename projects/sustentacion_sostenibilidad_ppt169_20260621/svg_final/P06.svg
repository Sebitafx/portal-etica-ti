  </text>
  
  <text font-size="26" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#CBD5E1" x="300" y="420">• En pantallas OLED/AMOLED, los píxeles negros literalmente se apagan.</text><text font-size="26" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#CBD5E1" x="300" y="470">• Logramos un ahorro directo de batería en los dispositivos móviles de los</text><text font-size="26" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#CBD5E1" x="320" y="510">estudiantes y usuarios.</text><text font-size="26" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#CBD5E1" x="300" y="560">• Al extender la duración de la batería, prolongamos la vida útil del hardware,</text><text font-size="26" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" fill="#CBD5E1" x="320" y="600">combatiendo directamente los residuos electrónicos.</text></svg>